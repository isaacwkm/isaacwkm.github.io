---
layout: default
title: "DevBlog"
permalink: /devBlog/
---

<h1>&emsp;&emsp;DevBlog</h1>
<hr style="width: 80%; margin: 0px auto;">
<ul>
  {% for post in site.devBlog %}
    <li>
      <a href="{{ post.url }}">{{ post.title }}</a> - {{ post.date | date: "%B %d, %Y" }}
      <p>{{ post.excerpt }}</p>
    </li>
  {% endfor %}
</ul>
